# ==============================================================================
# FRAUD DETECTION SYSTEM - DOCKER COMPOSE
# ==============================================================================
# This file orchestrates both services:
# - Go API Orchestrator (port 8080) - handles requests, alerting
# - Python ML Service (port 8000) - model inference, SHAP explanations
#
# Usage:
#   docker-compose up --build
#
# Prerequisites:
#   Place your trained models in ./python-ml-service/models/
#   - autoencoder_model.pth
#   - mlp_classifier.pth
#   - scaler.pkl
# ==============================================================================

services:
  # ----------------------------------------------------------------------------
  # Go API Orchestrator
  # ----------------------------------------------------------------------------
  go-api:
    build:
      context: ./go-api
      dockerfile: Dockerfile
    container_name: fraud-detection-api
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - ENV=development
      # ML Service connection
      - ML_SERVICE_URL=http://ml-service:8000
      - ML_SERVICE_TIMEOUT=10s
      # Fraud detection settings
      # Classification threshold lives with the trained model
      # (python-ml-service/models/<dataset>/optimal_threshold.json) and is
      # applied by the Python service. The Go API consumes its is_fraud bool.
      - ALERT_ON_FRAUD=true
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
      - ALERT_EMAIL=${ALERT_EMAIL:-}
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
    depends_on:
      ml-service:
        condition: service_healthy
    networks:
      - fraud-detection-network
    restart: unless-stopped

  # ----------------------------------------------------------------------------
  # Python ML Service
  # ----------------------------------------------------------------------------
  ml-service:
    build:
      context: ./python-ml-service
      dockerfile: Dockerfile
    container_name: fraud-ml-service
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=/app/models
      - PYTHONUNBUFFERED=1
    volumes:
      # Mount the trained model files for the active dataset.
      # Switch datasets by setting DATASET env var before running docker-compose:
      #   DATASET=ulb     docker-compose up   (default — European credit card, anonymous V1-V28)
      #   DATASET=sparkov docker-compose up   (Sparkov synthetic, named features for SHAP demo)
      #
      # Expected files in each subdirectory:
      #   scaler.pkl, autoencoder_model.pth, mlp_classifier.pth,
      #   optimal_threshold.json, feature_config.json
      #   (+ onehot_encoder.pkl for sparkov)
      - ./python-ml-service/models/${DATASET:-ulb}:/app/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s  # Allow time for model loading
    networks:
      - fraud-detection-network
    restart: unless-stopped

# ==============================================================================
# Network
# ==============================================================================
networks:
  fraud-detection-network:
    driver: bridge
